name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/docker-publish.yml"

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # ── 2. Metadata ──────────────────────────────────────────────────────
      - name: "🏷️  Generate timestamp tag (DDMMYYYY.HHMMSS)"
        id: ts
        run: |
          TAG=$(date -u +'%d%m%Y.%H%M%S')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "### 🏷️ Image Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rolling   | \`latest\` |" >> "$GITHUB_STEP_SUMMARY"

      # ── 3. Docker setup ──────────────────────────────────────────────────
      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ── 4. Registry auth ─────────────────────────────────────────────────
      - name: "🔐 Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Build (no push) ───────────────────────────────────────────────
      - name: "🏗️  Build Docker image"
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          load: true
          tags: |
            jsrankit/wsonemigratorsrv:latest
            jsrankit/wsonemigratorsrv:${{ steps.ts.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Smoke test ────────────────────────────────────────────────────
      - name: "🔍 Verify image was built"
        run: |
          docker image inspect jsrankit/wsonemigratorsrv:latest \
            --format '✅ Image size: {{.Size}} bytes — Created: {{.Created}}'

      # ── 7. Push both tags ────────────────────────────────────────────────
      - name: "🚀 Push :latest to Docker Hub"
        run: docker push jsrankit/wsonemigratorsrv:latest

      - name: "🚀 Push :${{ steps.ts.outputs.tag }} to Docker Hub"
        run: docker push jsrankit/wsonemigratorsrv:${{ steps.ts.outputs.tag }}

      # ── 8. Job summary ───────────────────────────────────────────────────
      - name: "📋 Write job summary"
        run: |
          echo "### ✅ Docker Hub Push Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`jsrankit/wsonemigratorsrv\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tags pushed** | \`latest\`, \`${{ steps.ts.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
